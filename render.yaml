services:
  - type: web
    name: tricord-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        generateValue: true
      - key: HUBSPOT_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
